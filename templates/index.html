<!DOCTYPE html>
<html>
<head>
    <title>FindMyCareer</title>

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <!-- Responsive scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div id="start-screen" class="start-screen">
    <h1>🌾 FindMyCareer</h1>
    <button class="btn start-btn" onclick="startGame()">START</button>
</div>

<div id="game-ui" class="app" style="display: none;">

    <h1>🌾 FindMyCareer</h1>

    <div class="dialogue">
        <p id="question">{{ question }}</p>
    </div>

    <div class="buttons">
        <button class="btn yes" onclick="answer('yes')">YES</button>
        <button class="btn no" onclick="answer('no')">NO</button>
    </div>

    <button class="btn reset" onclick="restart()">RESET</button>

    <div id="grid">
    {% for c in careers %}
        <div class="card" data-name="{{ c.name }}">
            <div class="icon">{{ c.icon }}</div>
            <div class="name">{{ c.name }}</div>
        </div>
    {% endfor %}
    </div>

    <div id="result"></div>

</div>
<script>

function startGame() {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-ui").style.display = "block";
}

function answer(choice) {
    fetch('/answer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({answer: choice})
    })
    .then(res => res.json())
    .then(data => {

        // 🏁 FINISHED STATE
        if (data.done) {

            // Update question text
            document.getElementById("question").innerText = "🏆 Your Career:";

            // Hide buttons so user can't click again
            document.querySelector(".buttons").style.display = "none";

            // Show result
            let result = document.getElementById("result");
            result.innerHTML = `
                <div class="result-card">
                    <div class="icon">${data.career.icon}</div>
                    <h3>${data.career.name}</h3>
                    <p>${data.career.desc}</p>
                </div>
            `;

            return; // 🔥 STOP HERE
        }

        // 🧠 NORMAL FLOW
        document.getElementById("question").innerText = data.question;

        // Update visible careers
        document.querySelectorAll(".card").forEach(card => {
            let name = card.dataset.name;

            if (!data.careers.some(c => c.name === name)) {
                card.style.display = "none";
            }
        });
    });
}

function restart() {
    fetch('/reset').then(() => location.reload());
}
</script>
<div class="footer">
    <p>Designed by Teacher ANZ</p>
</div>
</body>
</html>
