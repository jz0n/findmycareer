<!DOCTYPE html>
<html>
<head>
    <title>FindMyCareer</title>

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="/static/favicon.png">
    <link rel="shortcut icon" href="/static/favicon.png">
</head>

<body>



<div id="game-ui" class="app">

    <h1>🌾 FindMyCareer</h1>

    <div class="dialogue">
        <p id="question">{{ question }}</p>
    </div>

    <div class="buttons">
        <button class="btn yes" onclick="answer('yes')">YES</button>
        <button class="btn no" onclick="answer('no')">NO</button>
    </div>

    <button class="btn reset" onclick="restart()">RESET</button>

    <div id="grid">
    {% for c in careers %}
        <div class="card" data-name="{{ c.name }}">
            <div class="icon">{{ c.icon }}</div>
            <div class="name">{{ c.name }}</div>
        </div>
    {% endfor %}
    </div>

    <div id="result"></div>

</div>

<script>

function answer(choice) {
    fetch('/answer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({answer: choice})
    })
    .then(res => res.json())
    .then(data => {

        console.log("RESPONSE:", data);

        // 🏁 FINISHED
        if (data.done) {
            document.getElementById("question").innerText = "🏆 Your Career:";

            document.querySelector(".buttons").style.display = "none";

            let result = document.getElementById("result");
            result.innerHTML = `
                <div class="result-card big-result">
                    <div class="icon big-icon">${data.career.icon}</div>
                    <h2>🏆 YOUR CAREER</h2>
                    <h1 class="career-name">${data.career.name}</h1>
                    <p>${data.career.desc}</p>
                </div>
            `;
            return;
        }

        // 🧠 UPDATE QUESTION
        if (data.question) {
            document.getElementById("question").innerText = data.question;
        }

        // 🎯 SAFE GRID UPDATE (THIS FIXES YOUR BUG)
        if (Array.isArray(data.careers)) {
            document.querySelectorAll(".card").forEach(card => {
                let name = card.dataset.name;

                if (!data.careers.some(c => c.name === name)) {
                    card.classList.add("fade");
                    setTimeout(() => {
                        card.style.display = "none";
                    }, 200);
                }
            });
        }

    })
    .catch(err => {
        console.error("FETCH ERROR:", err);
    });
}

function restart() {
    fetch('/reset').then(() => location.reload());
}
</script>

<div class="footer">
    <p>Designed by Teacher ANZ | JZON 2026</p>
</div>

</body>
</html>
